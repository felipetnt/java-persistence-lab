services:
  java_db:
    image: mysql:8.0
    container_name: java_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rest-api
      MYSQL_USER: user
      MYSQL_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: {}